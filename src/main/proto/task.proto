syntax = "proto3";

package com.vorontsov.task;

option java_multiple_files = true;
option java_package = "com.vorontsov.task";
option java_outer_classname = "TaskProto";

service StorageService {
  rpc count(Empty) returns (CountResponse);
  rpc range(RangeRequest) returns (stream Entry);
  rpc put(Entry) returns (Empty);
  rpc get(KeyRequest) returns (Entry);
  rpc delete(KeyRequest) returns (Empty);
}

message Empty {}

message CountResponse {
  int64 count = 1;
}

message RangeRequest {
  string key_since = 1;
  string key_to = 2;
}

message Entry {
  string key = 1;
  string value = 2;
}
message KeyRequest {
  string key = 1;
}