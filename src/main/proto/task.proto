syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.vorontsov.task";

package task;

service StorageService {
  rpc Count (Empty) returns (CountResponse);
  rpc Range (RangeRequest) returns (stream Entry);
}

message Empty {}

message CountResponse {
  int64 count = 1;
}

message RangeRequest {
  string key_since = 1;
  string key_to = 2;
}

message Entry {
  string key = 1;
  string value = 2;
}